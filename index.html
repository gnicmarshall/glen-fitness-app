<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FitPlan">
  <meta name="theme-color" content="#f1f3f7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Glen's Fitness Plan</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="scroll-body" id="home-body"></div>
  </div>

  <!-- TRAIN -->
  <div class="screen" id="screen-train">
    <div class="screen-header">
      <div class="screen-title">Train</div>
      <div class="screen-sub">Strength · Running · Mobility</div>
    </div>
    <div class="scroll-body" id="train-body"></div>
  </div>

  <!-- EAT -->
  <div class="screen" id="screen-eat">
    <div class="screen-header">
      <div class="screen-title">Fuel</div>
      <div class="screen-sub">2,350–2,500 kcal · 180–210 g protein daily</div>
    </div>
    <div class="scroll-body" id="eat-body"></div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="screen-header">
      <div class="screen-title">History</div>
      <div class="screen-sub">Every session, meal and measurement logged</div>
    </div>
    <div class="scroll-body" id="history-body"></div>
  </div>

  <!-- PROGRESS -->
  <div class="screen" id="screen-progress">
    <div class="screen-header">
      <div class="screen-title">Progress</div>
      <div class="screen-sub">95.8 kg → 89 kg · 12-week programme</div>
    </div>
    <div class="scroll-body" id="prog-body"></div>
  </div>

  <!-- TAB BAR -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="home"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Home</button>
    <button class="tab-btn" data-tab="train"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5v11M3 9v6M17.5 6.5v11M21 9v6M6.5 12h11"/></svg>Train</button>
    <button class="tab-btn" data-tab="eat"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v7a2 2 0 0 0 2 2 2 2 0 0 0 2-2V3M7 12v9M17 3c-1.7 0-3 1.8-3 4s1 4 3 4M17 3v18"/></svg>Fuel</button>
    <button class="tab-btn" data-tab="history"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>History</button>
    <button class="tab-btn" data-tab="progress"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16"/><path d="M7 15l3.5-4 3 2.5L20 7"/></svg>Progress</button>
  </nav>

</div><!-- #app -->

<!-- REST TIMER BAR -->
<div id="rest-bar" class="restbar">
  <div class="rb-info"><span class="rb-lbl">Rest</span><span class="rb-time" id="rest-time">1:30</span></div>
  <div class="rb-btns">
    <button class="rb-btn" onclick="addRest(-15)">−15s</button>
    <button class="rb-btn" onclick="addRest(15)">+15s</button>
    <button class="rb-btn skip" onclick="skipRest()">Skip</button>
  </div>
</div>

<!-- MOBILITY DRILL MODAL -->
<div class="mover" id="drill-modal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtit" id="drill-modal-title"></div>
    <div style="font-size:13px;color:var(--cyan);font-weight:700;margin-bottom:4px" id="drill-modal-reps"></div>
    <div style="font-size:13.5px;color:var(--text2);margin-bottom:16px;line-height:1.6" id="drill-modal-why"></div>
    <div class="timerdisp" id="timer-display">--:--</div>
    <div class="timerbtns">
      <button class="btn ghost" id="timer-toggle" onclick="toggleTimer()">▶ Start</button>
      <button class="btn ghost" onclick="resetTimer()">↺ Reset</button>
    </div>
    <div style="display:flex;gap:9px">
      <button class="btn block" onclick="markDrillDone(timerDrillIdx)">✅ Mark Done</button>
      <button class="btn ghost block" onclick="closeDrillModal()">Close</button>
    </div>
  </div>
</div>

<!-- SWAP EXERCISE MODAL -->
<div class="mover" id="swap-modal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtit">Swap exercise</div>
    <div id="swap-body"></div>
  </div>
</div>

<!-- Firebase (compat SDK) for cloud backup + cross-device sync -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/cloud.js"></script>
</body>
</html>
