<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitPlan">
  <meta name="theme-color" content="#07070f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Glen's Fitness Plan</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="scroll-body" id="home-body"></div>
  </div>

  <!-- TRAIN -->
  <div class="screen" id="screen-train">
    <div class="screen-header">
      <div class="screen-title">Train 💪</div>
      <div class="screen-sub">Strength · Running · Mobility</div>
    </div>
    <div class="scroll-body" id="train-body"></div>
  </div>

  <!-- EAT -->
  <div class="screen" id="screen-eat">
    <div class="screen-header">
      <div class="screen-title">Fuel 🥗</div>
      <div class="screen-sub">2,350–2,500 kcal · 180–210 g protein daily</div>
    </div>
    <div class="scroll-body" id="eat-body"></div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="screen-header">
      <div class="screen-title">History 📋</div>
      <div class="screen-sub">Every session, meal and measurement logged</div>
    </div>
    <div class="scroll-body" id="history-body"></div>
  </div>

  <!-- PROGRESS -->
  <div class="screen" id="screen-progress">
    <div class="screen-header">
      <div class="screen-title">Progress 📈</div>
      <div class="screen-sub">95.8 kg → 89 kg · 12-week programme</div>
    </div>
    <div class="scroll-body" id="prog-body"></div>
  </div>

  <!-- TAB BAR -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="home"><span class="ti">🏠</span>Home</button>
    <button class="tab-btn" data-tab="train"><span class="ti">💪</span>Train</button>
    <button class="tab-btn" data-tab="eat"><span class="ti">🥗</span>Fuel</button>
    <button class="tab-btn" data-tab="history"><span class="ti">📋</span>History</button>
    <button class="tab-btn" data-tab="progress"><span class="ti">📈</span>Progress</button>
  </nav>

</div><!-- #app -->

<!-- MOBILITY DRILL MODAL -->
<div class="mover" id="drill-modal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtit" id="drill-modal-title"></div>
    <div style="font-size:13px;color:var(--cyan);font-weight:700;margin-bottom:4px" id="drill-modal-reps"></div>
    <div style="font-size:13.5px;color:var(--text2);margin-bottom:16px;line-height:1.6" id="drill-modal-why"></div>
    <div class="timerdisp" id="timer-display">--:--</div>
    <div class="timerbtns">
      <button class="btn ghost" id="timer-toggle" onclick="toggleTimer()">▶ Start</button>
      <button class="btn ghost" onclick="resetTimer()">↺ Reset</button>
    </div>
    <div style="display:flex;gap:9px">
      <button class="btn block" onclick="markDrillDone(timerDrillIdx)">✅ Mark Done</button>
      <button class="btn ghost block" onclick="closeDrillModal()">Close</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
